name: Site Checker

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: "Production site URL to check"
        required: true
        default: "https://YOUR-VERCEL-SITE.vercel.app"
  push:
    branches:
      - main

jobs:
  check-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Start local Next server
        run: |
          npm run start -- --port 3000 &
          sleep 10

      - name: Check local site
        run: node site-checker.js http://localhost:3000

      - name: Check production site manually
        if: github.event_name == 'workflow_dispatch'
        run: node site-checker.js "${{ github.event.inputs.site_url }}"
